        <text
           xml:space="preserve"
           style="font-size:12px;font-style:normal;font-weight:normal;fill:black;fill-opacity:1;stroke:none;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;stroke-opacity:1;font-family:Bitstream Vera Sans"
           x="93.016556"
           y="218.03186"
           id="text1654"
           transform="matrix(0.191823,4.27958e-2,-9.781869e-2,0.230572,611.3015,-7.45788)"><tspan
             sodipodi:role="line"
             id="tspan1656"
             x="93.016556"
             y="218.03186">Well, if you're travellin' in the north country fair, </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="233.03186"
             id="tspan1658">Where the winds hit heavy on the borderline </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="248.03186"
             id="tspan1660">Remember me to one who lives there </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="263.03186"
             id="tspan1662">She once was a true love of mine.  </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="278.03186"
             id="tspan1664" /><tspan
             sodipodi:role="line"
             x="93.016556"
             y="293.03186"
             id="tspan1666">Well, if you go in the snowflake storm </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="308.03186"
             id="tspan1668">When the rivers freeze and summer ends </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="323.03186"
             id="tspan1670">Please see she has a coat so warm </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="338.03186"
             id="tspan1672">To keep her from the howlin' winds.  </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="353.03186"
             id="tspan1674" /><tspan
             sodipodi:role="line"
             x="93.016556"
             y="368.03186"
             id="tspan1676">Please see for me if her hair hangs long </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="383.03186"
             id="tspan1678">If it rolls and flows all down her breast, </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="398.03186"
             id="tspan1680">Please see for me if her hair hangs long, </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="413.03186"
             id="tspan1682">That's the way I remember her best.  </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="428.03186"
             id="tspan1684" /><tspan
             sodipodi:role="line"
             x="93.016556"
             y="443.03186"
             id="tspan1686">I'm a wonderin' if she remembers me at all </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="458.03186"
             id="tspan1688">Many times I've often prayed </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="473.03186"
             id="tspan1690">In the darkness of my night </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="488.03186"
             id="tspan1692">In the brightness of my day.  </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="503.03186"
             id="tspan1694" /><tspan
             sodipodi:role="line"
             x="93.016556"
             y="518.03186"
             id="tspan1696">So if you're travellin' in the north country fair, </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="533.03186"
             id="tspan1698">Where the winds hit heavy on the borderline </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="548.03186"
             id="tspan1700">Remember me to one who lives there, </tspan><tspan
             sodipodi:role="line"
             x="93.016556"
             y="563.03186"
             id="tspan1702">She once was a true love of mine.</tspan></text>
